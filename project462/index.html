<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Thai Handwriting ML</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar">
        <div class="nav-left">
            <div class="logo"><i class="fa-solid fa-dice"></i></div>
            <div>
                <h2>Thai Handwriting ML</h2>
                <p>ระบบจำแนกลายมือภาษาไทย</p>
            </div>
        </div>

        <div class="nav-menu">
            <a href="index.html" class="nav-btn active-nav">
                <i class="fa-solid fa-user"></i> User/Admin</a>
                
            <a href="dataset.html" class="nav-btn">
                <i class="fa-solid fa-database"></i> Dataset</a>
        </div>
    </nav>


    <!-- ================= MAIN ================= -->

    <div class="container">

        <!-- ================= USER PAGE ================= -->

        <div class="card">

            <div class="title">

                <div class="icon">
                    <i class="fa-solid fa-user-group"></i>
                </div>

                <div>
                    <h2>User Page</h2>

                    <div class="subtitle">
                        วาดตัวเลข ๓๖-๔๐ แล้วกด Predict
                    </div>
                </div>

            </div>

            <!-- Canvas -->

            <div class="canvas-box">

                <canvas class="canvas-index" id="canvas"></canvas>

            </div>

            <!-- Buttons -->

            <div class="btn-group">

                <button class="predict-btn">
                    Predict
                </button>

                <button class="clear-btn" onclick="clearCanvas()">
                    Clear
                </button>

            </div>

            <!-- Result -->

            <div class="result-box">

                <div class="result-card">
                    <div class="label">Prediction</div>
                    <div class="value">๓๗</div>
                </div>

                <div class="result-card">
                    <div class="label">Confidence</div>
                    <div class="value">98%</div>
                </div>

            </div>

        </div>

        <!-- ================= ADMIN PAGE ================= -->

        <div class="card">

            <div class="title">

                <div class="icon dark">
                    <i class="fa-solid fa-gear"></i>
                </div>

                <div>
                    <h2>Admin Page</h2>

                    <div class="subtitle">
                        จัดการโมเดล Machine Learning
                    </div>
                </div>

            </div>

            <!-- Model -->

            <div class="model-box">

                <div class="model-title">
                    Current Model
                </div>

                <div class="model-name">
                    model_v1.pkl
                </div>

            </div>

            <!-- Upload -->

            <div class="upload-box">

                <div class="upload-icon">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                </div>

                <div class="upload-model">
                    <h3>Upload Model</h3>
                    <p>รองรับไฟล์ .pkl</p>
                    <input type="file" class="input-type">
                </div>

            </div>

            <!-- Buttons -->

            <div class="btn-group-column">

                <button class="upload-btn">
                    Upload Model
                </button>

                <button class="confirm-btn">
                    Confirm Upload
                </button>

            </div>

        </div>

    </div>


</body>

</html>
