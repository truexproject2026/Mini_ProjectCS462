name: Keep Backend Alive

on:
  schedule:
    - cron: '*/10 * * * *' # Run every 10 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          curl -s https://mini-pj-online.onrender.com/ > /dev/null
          echo "Pinged AI Backend at $(date)"
